<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clling1plan</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- تنسيقات عامة --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #E0F2FE 0%, #F8FAFC 100%) no-repeat fixed;
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- حاوية الفيديو (البطاقة الرئيسية) --- */
        .video-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px; /* أقصى عرض مريح للعين */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* --- مشغل الفيديو المتجاوب (Responsive) --- */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9; /* يضمن أبعاد مثالية للفيديو */
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* للمحافظة على أبعاد الفيديو الأصلي دون تمطيط */
        }

        /* --- تفاصيل الفيديو أسفل المشغل --- */
        .video-details {
            padding: 24px;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .video-description {
            font-size: 1rem;
            color: #64748b;
            line-height: 1.6;
        }

        /* التجاوب مع الهواتف الذكية */
        @media (max-width: 480px) {
            .video-details {
                padding: 16px;
            }
            .video-title {
                font-size: 1.2rem;
            }
            .video-description {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="video-card">
        
        <div class="video-container">
            <video controls>
                <source src="videoplayback.mp4" type="video/mp4">
                متصفحك لا يدعم تشغيل هذا الفيديو.
            </video>
        </div>

        <div class="video-details">
            <h2 class="video-title">Learn the basics of HTML and css iphone</h2>
            <p class="video-description">
               By the time you learn everything in this course, you'll be good at the basics of HTML.
            </p>
        </div>

    </div>

</body>
</html>
